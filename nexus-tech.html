<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0a0f; margin: 0; }

    /* Aurora background */
    .aurora-bg { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
    .aurora-bg::before { content:''; position:absolute; width:900px; height:900px; border-radius:50%; background:radial-gradient(circle,rgba(139,92,246,0.18) 0%,transparent 70%); top:-300px; left:-200px; animation:aurora1 10s ease-in-out infinite alternate; }
    .aurora-bg::after { content:''; position:absolute; width:700px; height:700px; border-radius:50%; background:radial-gradient(circle,rgba(236,72,153,0.14) 0%,transparent 70%); top:50px; right:-150px; animation:aurora2 12s ease-in-out infinite alternate; }
    .aurora3 { position:absolute; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(59,130,246,0.1) 0%,transparent 70%); bottom:-100px; left:40%; animation:aurora3 14s ease-in-out infinite alternate; }
    @keyframes aurora1 { from{transform:translate(0,0) scale(1)} to{transform:translate(120px,60px) scale(1.2)} }
    @keyframes aurora2 { from{transform:translate(0,0) scale(1)} to{transform:translate(-80px,100px) scale(1.3)} }
    @keyframes aurora3 { from{transform:translateX(0) scale(1)} to{transform:translateX(80px) scale(1.2)} }

    /* Glass styles */
    .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); }
    .glass-dark { background:rgba(0,0,0,0.35); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.06); }

    /* Product cards — Lovable style: dark almost-black bg */
    .product-card {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .product-card:hover {
      border-color: rgba(139,92,246,0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(139,92,246,0.15);
    }
    .product-card-img {
      background: #0d0d14;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .product-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .product-card:hover .product-card-img img { transform: scale(1.04); }

    /* Glass card for other uses */
    .glass-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); transition:all 0.3s ease; border-radius:16px; }
    .glass-card:hover { background:rgba(255,255,255,0.06); border-color:rgba(139,92,246,0.5); transform:translateY(-6px); box-shadow:0 24px 60px rgba(139,92,246,0.2); }

    .gradient-text { background:linear-gradient(135deg,#fff 0%,#a78bfa 50%,#ec4899 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .gradient-text-pink { background:linear-gradient(135deg,#ec4899,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    .btn-primary { background:linear-gradient(135deg,#7c3aed,#9333ea); transition:all 0.3s; }
    .btn-primary:hover { background:linear-gradient(135deg,#6d28d9,#7c3aed); transform:translateY(-2px); box-shadow:0 8px 30px rgba(124,58,237,0.45); }

    .badge-new { background:linear-gradient(135deg,#7c3aed,#9333ea); }
    .badge-featured { background:linear-gradient(135deg,#0ea5e9,#6366f1); }
    .badge-hot { background:linear-gradient(135deg,#f59e0b,#ef4444); }
    .badge-limited { background:linear-gradient(135deg,#10b981,#0ea5e9); }

    /* Category badge on product card — pill style like Lovable */
    .cat-pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 100px;
    }

    .ticker-wrap { overflow:hidden; }
    .ticker { display:inline-flex; gap:4rem; animation:ticker 35s linear infinite; white-space:nowrap; }
    @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    .stat-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); transition:all 0.3s; }
    .stat-card:hover { border-color:rgba(139,92,246,0.4); background:rgba(139,92,246,0.05); }

    .nav-link.active { color:white; }
    .nav-link.active::after { content:''; display:block; height:2px; background:linear-gradient(90deg,#7c3aed,#ec4899); border-radius:2px; margin-top:2px; }

    /* Hero device section */
    .hero-device-section {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg, #0d0d1a 0%, #12071e 50%, #070d1a 100%);
      min-height: 540px;
    }
    .hero-device-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .spec-card-float {
      position: absolute;
      background: rgba(15,10,30,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 16px;
      min-width: 140px;
    }
    .spec-card-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: rgba(124,58,237,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .rotate-360 { animation: rotate360 8s linear infinite; }
    @keyframes rotate360 { from{transform:rotateY(0deg)} to{transform:rotateY(360deg)} }

    .product-img-main { transition: all 0.4s ease; }
    .product-thumb { transition: all 0.2s ease; cursor: pointer; }
    .product-thumb:hover { border-color: rgba(139,92,246,0.8) !important; }
    .product-thumb.active { border-color: rgba(139,92,246,1) !important; box-shadow: 0 0 20px rgba(139,92,246,0.4); }

    .tab-btn { transition: all 0.2s; border-bottom: 2px solid transparent; }
    .tab-btn.active { border-bottom-color: #7c3aed; color: white; }

    input, textarea, select { color: white !important; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3) !important; }

    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

    .checkout-step { opacity:0.4; transition:all 0.3s; }
    .checkout-step.active { opacity:1; }
    .checkout-step.done { opacity:0.7; }
    .step-number { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .step-number.active { background:linear-gradient(135deg,#7c3aed,#9333ea); color:white; }
    .step-number.done { background:rgba(16,185,129,0.2); border:1px solid rgba(16,185,129,0.5); color:#10b981; }
    .step-number.pending { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#6b7280; }
    .form-input { width:100%; padding:12px 16px; border-radius:12px; outline:none; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; transition:all 0.2s; }
    .form-input:focus { border-color:rgba(139,92,246,0.6); background:rgba(139,92,246,0.05); }
    .form-label { font-size:13px; color:#9ca3af; margin-bottom:6px; display:block; }
    .shipping-option { padding:16px; border-radius:12px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); cursor:pointer; transition:all 0.2s; }
    .shipping-option:hover { border-color:rgba(139,92,246,0.4); }
    .shipping-option.selected { border-color:rgba(139,92,246,0.8); background:rgba(139,92,246,0.08); }
    .order-success { animation: successPop 0.5s ease; }
    @keyframes successPop { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }

    /* Newsletter section — Lovable large style */
    .newsletter-section {
      background: linear-gradient(135deg, rgba(88,28,235,0.35) 0%, rgba(168,50,180,0.25) 50%, rgba(236,72,153,0.2) 100%);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 24px;
      padding: 80px 40px;
      text-align: center;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const ADMIN_PASSWORD = 'admin123';

function getProducts() {
  try { return JSON.parse(localStorage.getItem('nexus-products') || '[]'); } catch { return []; }
}
function saveProducts(p) { localStorage.setItem('nexus-products', JSON.stringify(p)); }
function addProduct(p) { const ps = getProducts(); ps.push(p); saveProducts(ps); }
function deleteProduct(id) { saveProducts(getProducts().filter(p => p.id !== id)); }
function updateProduct(u) { saveProducts(getProducts().map(p => p.id === u.id ? u : p)); }

function getOrders() {
  try { return JSON.parse(localStorage.getItem('nexus-orders') || '[]'); } catch { return []; }
}
function saveOrder(order) {
  const orders = getOrders();
  orders.unshift(order);
  localStorage.setItem('nexus-orders', JSON.stringify(orders));
}

const SHIPPING_METHODS = [
  { id:'standard', name:'Spedizione Standard', desc:'5-7 giorni lavorativi', price:0, icon:'📦' },
  { id:'express', name:'Spedizione Express', desc:'2-3 giorni lavorativi', price:9.99, icon:'⚡' },
  { id:'overnight', name:'Consegna Overnight', desc:'Giorno lavorativo successivo', price:19.99, icon:'🚀' },
];

const getBadgeClass = (b) => {
  if (!b) return '';
  const bl = b.toLowerCase();
  if (bl === 'new' || bl === 'nuovo') return 'badge-new';
  if (bl === 'featured' || bl === 'in evidenza') return 'badge-featured';
  if (bl === 'hot') return 'badge-hot';
  if (bl === 'limited' || bl === 'limitato') return 'badge-limited';
  return 'badge-new';
};

const tickerItems = ['★ T3 Awards 2026','Design of the Year · Wallpaper*','Best in Class · WIRED','Engineered in Zürich','★ Fast Company Innovation Award','48h battery · N1 Silicon','★ iF Design Gold 2026'];
const stats = [
  { value:'2.4M+', label:'Clienti soddisfatti' },
  { value:'84', label:'Paesi serviti' },
  { value:'37', label:'Premi internazionali' },
  { value:'99.99%', label:'Uptime garantito' },
];

/* ─── FOOTER ─── */
function Footer({ setPage }) {
  return (
    <footer style={{borderTop:'1px solid rgba(255,255,255,0.06)',background:'rgba(0,0,0,0.3)'}} className="mt-20">
      <div className="max-w-6xl mx-auto px-6 py-16">

        {/* Newsletter — Lovable large style */}
        <div className="newsletter-section mb-16">
          <h2 className="text-5xl font-black text-white mb-3">
            Join <span className="gradient-text-pink">2.4 million</span> believers.
          </h2>
          <p className="text-gray-400 text-lg mb-10">Be the first to know about new products, drops and stories.</p>
          <div className="flex gap-3 max-w-lg mx-auto">
            <input type="email" placeholder="your@email.com"
              className="flex-1 px-5 py-4 rounded-2xl outline-none text-base"
              style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)'}} />
            <button className="btn-primary px-8 py-4 rounded-2xl font-semibold text-white text-base">Subscribe</button>
          </div>
        </div>

        <div className="grid grid-cols-4 gap-8 mb-12">
          <div>
            <div className="flex items-center gap-2 mb-4">
              <div className="w-8 h-8 rounded-lg btn-primary flex items-center justify-center text-xs font-bold text-white">N</div>
              <span className="font-bold text-white">NEXUS<span className="gradient-text">TECH</span></span>
            </div>
            <p className="text-gray-500 text-sm">Tecnologia premium per il domani.</p>
            <p className="text-gray-600 text-sm mt-2">ITALIA</p>
          </div>
          <div>
            <h4 className="text-white font-semibold mb-4">Negozio</h4>
            <ul className="space-y-2 text-gray-500 text-sm">
              {['Audio','Wearables','Computing','Vision'].map(i => (
                <li key={i}><button onClick={() => setPage('products')} className="hover:text-gray-300 transition">{i}</button></li>
              ))}
            </ul>
          </div>
          <div>
            <h4 className="text-white font-semibold mb-4">Azienda</h4>
            <ul className="space-y-2 text-gray-500 text-sm">
              {['Chi siamo','Lavora con noi','Stampa','Sostenibilità'].map(i => (
                <li key={i}><button className="hover:text-gray-300 transition">{i}</button></li>
              ))}
            </ul>
          </div>
          <div>
            <h4 className="text-white font-semibold mb-4">Supporto</h4>
            <ul className="space-y-2 text-gray-500 text-sm">
              {['Centro assistenza','Contatti','Garanzia','Resi'].map(i => (
                <li key={i}><button className="hover:text-gray-300 transition">{i}</button></li>
              ))}
            </ul>
          </div>
        </div>
        <div className="flex justify-between items-center pt-6" style={{borderTop:'1px solid rgba(255,255,255,0.06)'}}>
          <p className="text-gray-600 text-sm">© 2026 Nexus Tech AG. Tutti i diritti riservati.</p>
          <p className="text-gray-700 text-sm">v4.2.0 · build a91f</p>
        </div>
      </div>
    </footer>
  );
}

/* ─── PRODUCT DETAIL ─── */
function ProductDetailPage({ product, onAddToCart, onBack, allProducts, setCurrentProduct }) {
  const [activeImg, setActiveImg] = useState(0);
  const [activeTab, setActiveTab] = useState('overview');
  const [wishlisted, setWishlisted] = useState(false);
  const [is360, setIs360] = useState(false);
  const [added, setAdded] = useState(false);
  const [qty, setQty] = useState(1);

  const images = product.image ? [product.image] : [];
  const related = allProducts.filter(p => p.id !== product.id && p.category === product.category).slice(0, 3);

  const handleAddToCart = () => {
    for (let i = 0; i < qty; i++) onAddToCart(product);
    setAdded(true);
    setTimeout(() => setAdded(false), 2000);
  };

  const originalPrice = product.originalPrice || Math.round(product.price * 1.2);
  const discount = Math.round((1 - product.price / originalPrice) * 100);

  return (
    <div className="fade-in">
      <div className="max-w-6xl mx-auto px-6 pt-28 pb-10">
        <button onClick={onBack} className="text-gray-400 hover:text-white transition flex items-center gap-2 mb-8">
          ← Torna al catalogo
        </button>
        <div className="grid grid-cols-2 gap-16 mb-20">
          <div>
            <div className="relative rounded-3xl overflow-hidden mb-4" style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',aspectRatio:'1'}}>
              {images.length > 0 ? (
                <img src={images[activeImg]} alt={product.name}
                  className={`w-full h-full object-contain p-8 product-img-main ${is360 ? 'rotate-360' : ''}`}
                  style={{transition:'all 0.4s'}} />
              ) : (
                <div className="w-full h-full flex items-center justify-center text-8xl">📦</div>
              )}
              <button onClick={() => setIs360(!is360)}
                className={`absolute top-4 right-4 glass px-3 py-1.5 rounded-full text-xs font-bold transition ${is360 ? 'text-purple-400 border-purple-500' : 'text-gray-400'}`}
                style={{border: is360 ? '1px solid rgba(139,92,246,0.6)' : undefined}}>
                360°
              </button>
              <div className="absolute inset-0 pointer-events-none" style={{background:'radial-gradient(circle at 50% 50%,rgba(139,92,246,0.08) 0%,transparent 70%)'}}></div>
            </div>
          </div>
          <div className="flex flex-col">
            <div className="flex items-center gap-3 mb-4">
              <span className="cat-pill">{product.category}</span>
              {product.badge && (
                <span className={`${getBadgeClass(product.badge)} text-white text-xs font-bold px-3 py-1 rounded-full uppercase`}>{product.badge}</span>
              )}
            </div>
            <h1 className="text-4xl font-black text-white mb-2">{product.name}</h1>
            <p className="text-gray-400 text-lg mb-4">{product.tagline}</p>
            <div className="flex items-center gap-3 mb-6">
              <div className="flex gap-1">
                {[1,2,3,4,5].map(i => (
                  <span key={i} className={`text-lg ${i <= Math.round(product.rating) ? 'text-yellow-400' : 'text-gray-700'}`}>★</span>
                ))}
              </div>
              <span className="text-white font-semibold">{product.rating}</span>
              {product.reviews > 0 && <span className="text-gray-500 text-sm">{product.reviews.toLocaleString()} recensioni</span>}
            </div>
            <div className="flex items-center gap-4 mb-8">
              <span className="text-5xl font-black text-white">€{product.price}</span>
              <div className="flex flex-col">
                <span className="text-gray-500 line-through text-lg">€{originalPrice}</span>
                <span className="text-green-400 text-sm font-bold">-{discount}%</span>
              </div>
              <span className="text-gray-600 text-sm">IVA inclusa</span>
            </div>
            <div className="flex gap-3 mb-4">
              <div className="glass rounded-xl flex items-center">
                <button onClick={() => setQty(Math.max(1,qty-1))} className="px-4 py-3 text-gray-400 hover:text-white transition text-lg">−</button>
                <span className="px-4 text-white font-semibold">{qty}</span>
                <button onClick={() => setQty(qty+1)} className="px-4 py-3 text-gray-400 hover:text-white transition text-lg">+</button>
              </div>
              <button onClick={handleAddToCart}
                className={`flex-1 py-3 rounded-xl font-bold text-white text-lg transition ${added ? 'bg-green-600' : 'btn-primary'}`}>
                {added ? '✓ Aggiunto!' : 'Aggiungi al carrello'}
              </button>
            </div>
            <button onClick={() => setWishlisted(!wishlisted)}
              className={`w-full py-3 rounded-xl font-semibold transition glass hover:bg-white/10 ${wishlisted ? 'text-pink-400' : 'text-gray-400'}`}>
              {wishlisted ? '♥ Nella wishlist' : '♡ Aggiungi alla wishlist'}
            </button>
            <div className="mt-6 rounded-2xl p-4" style={{background:'rgba(139,92,246,0.08)',border:'1px solid rgba(139,92,246,0.2)'}}>
              <div className="flex items-center gap-2 mb-2">
                <span className="text-purple-400 text-sm">✦</span>
                <span className="text-purple-300 text-sm font-semibold">Nexus AI · spiegato</span>
              </div>
              <p className="text-gray-400 text-sm leading-relaxed">{product.description || 'Un prodotto straordinario progettato per chi non scende a compromessi.'}</p>
            </div>
          </div>
        </div>

        <div className="mb-8" style={{borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
          <div className="flex gap-8">
            {['overview','specs','reviews'].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)}
                className={`tab-btn pb-4 font-semibold capitalize transition ${activeTab===tab ? 'active text-white' : 'text-gray-500 hover:text-gray-300'}`}>
                {tab === 'overview' ? 'Panoramica' : tab === 'specs' ? 'Specifiche' : 'Recensioni'}
              </button>
            ))}
          </div>
        </div>

        {activeTab === 'overview' && (
          <div className="fade-in text-gray-400 leading-relaxed max-w-2xl">
            <p className="text-lg mb-4">{product.description || 'Un capolavoro ingegneristico realizzato con materiali aerospace-grade.'}</p>
            <p>Progettato per durare un decennio, con software aggiornabile e componenti riparabili.</p>
          </div>
        )}
        {activeTab === 'specs' && (
          <div className="fade-in">
            {product.specs && product.specs.length > 0 ? (
              <div className="grid grid-cols-2 gap-3 max-w-2xl">
                {product.specs.map((s, i) => (
                  <div key={i} className="glass rounded-xl p-4 flex justify-between items-center">
                    <span className="text-gray-400 text-sm">{s.label}</span>
                    <span className="text-white font-semibold text-sm">{s.value}</span>
                  </div>
                ))}
              </div>
            ) : <p className="text-gray-500">Nessuna specifica disponibile.</p>}
          </div>
        )}
        {activeTab === 'reviews' && (
          <div className="fade-in max-w-2xl">
            <div className="flex items-center gap-6 mb-8">
              <div className="text-center">
                <div className="text-6xl font-black text-white">{product.rating}</div>
                <div className="flex gap-1 justify-center mt-1">
                  {[1,2,3,4,5].map(i => <span key={i} className={i <= Math.round(product.rating) ? 'text-yellow-400' : 'text-gray-700'}>★</span>)}
                </div>
                <div className="text-gray-500 text-sm mt-1">{(product.reviews||0).toLocaleString()} recensioni</div>
              </div>
            </div>
            {[
              { name:'Marco R.', stars:5, text:'Prodotto eccezionale, supera ogni aspettativa.' },
              { name:'Sofia L.', stars:5, text:'Finalmente un prodotto che mantiene le promesse. Design sublime.' },
              { name:'Luca M.', stars:4, text:'Ottimo acquisto, solo un piccolo miglioramento sulla custodia.' },
            ].map((r,i) => (
              <div key={i} className="glass rounded-xl p-4 mb-3">
                <div className="flex justify-between mb-2">
                  <span className="font-semibold text-white">{r.name}</span>
                  <div className="flex gap-0.5">
                    {[1,2,3,4,5].map(s => <span key={s} className={s<=r.stars?'text-yellow-400 text-sm':'text-gray-700 text-sm'}>★</span>)}
                  </div>
                </div>
                <p className="text-gray-400 text-sm">{r.text}</p>
              </div>
            ))}
          </div>
        )}

        {related.length > 0 && (
          <div className="mt-16">
            <h2 className="text-2xl font-bold text-white mb-6">Potresti amare anche</h2>
            <div className="grid grid-cols-3 gap-6">
              {related.map(p => (
                <div key={p.id} className="product-card" onClick={() => setCurrentProduct(p)}>

    billingAddress:'', billingCity:'', billingZip:'',
    cardName:'', cardNumber:'', cardExpiry:'', cardCvv:'',
  });

  const subtotal = cart.reduce((sum,p) => sum + p.price, 0);
  const discount = couponApplied ? subtotal * 0.1 : 0;
  const shipping = SHIPPING_METHODS.find(m => m.id === shippingMethod)?.price || 0;
  const total = subtotal - discount + shipping;
  const updateForm = (key, val) => setForm(prev => ({...prev, [key]:val}));

    if (coupon.toUpperCase() === 'NEXUS10') setCouponApplied(true);

  const maxPrice = products.length > 0 ? Math.ceil(Math.max(...products.map(p => p.price)) / 100) * 100 : 5000;
  const toggleBadge = (b) => setSelectedBadges(prev => prev.includes(b) ? prev.filter(x => x !== b) : [...prev, b]);
  const resetFilters = () => { setCategory('All'); setSearch(''); setSort('default'); setPriceRange([0, maxPrice]); setSelectedBadges([]); setMinRating(0); };
  const hasActiveFilters = category !== 'All' || search || sort !== 'default' || priceRange[0] > 0 || priceRange[1] < maxPrice || selectedBadges.length > 0 || minRating > 0;

  let filtered = [...products];
  if (category !== 'All') filtered = filtered.filter(p => p.category === category);
  if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.tagline.toLowerCase().includes(search.toLowerCase()) || (p.description||'').toLowerCase().includes(search.toLowerCase()));
  filtered = filtered.filter(p => p.price >= priceRange[0] && p.price <= priceRange[1]);
  if (selectedBadges.length > 0) filtered = filtered.filter(p => p.badge && selectedBadges.some(b => p.badge.toLowerCase() === b.toLowerCase()));

  if (sort === 'price-asc') filtered = [...filtered].sort((a,b) => a.price - b.price);
  if (sort === 'price-desc') filtered = [...filtered].sort((a,b) => b.price - a.price);

              <div className="mb-5">
                <p className="text-xs text-gray-500 uppercase tracking-widest mb-3">Badge</p>

                  {allBadges.map(b => (
                    <button key={b} onClick={() => toggleBadge(b)}

              </div>
              <div>
                <p className="text-xs text-gray-500 uppercase tracking-widest mb-3">Rating min: {minRating > 0 ? `★ ${minRating}` : 'Tutti'}</p>

            </div>
          </div>

        <div className="flex-1">
          <div className="flex gap-2 mb-4 flex-wrap">

                    {p.image ? <img src={p.image} alt={p.name} /> : <div className="text-6xl">📦</div>}
                    <div style={{position:'absolute',top:'12px',left:'12px',right:'12px',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      {p.badge ? <span className={`${getBadgeClass(p.badge)} text-white text-xs font-bold px-3 py-1 rounded-full uppercase`}>{p.badge}</span> : <span></span>}

                    </div>
                  </div>
                  <div className="p-5">
                    <h3 className="font-bold text-white text-base mb-1">{p.name}</h3>
                    <p className="text-gray-500 text-sm mb-3">{p.tagline}</p>
                    <div className="flex justify-between items-center">
                      <p className="text-white font-black text-xl">€{p.price}</p>
                      <div className="flex items-center gap-1">
                        <span className="text-yellow-400 text-sm">★</span>
                        <span className="text-gray-400 text-sm">{p.rating}</span>
                      </div>
                    </div>
                    <button onClick={e => {e.stopPropagation();onAddToCart(p);}}
                      className="btn-primary w-full mt-3 py-2.5 rounded-xl text-white text-sm font-semibold">
                      Aggiungi al carrello
                    </button>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="space-y-3">
              {filtered.map(p => (
                <div key={p.id} className="product-card flex overflow-hidden" style={{height:'120px'}} onClick={() => onProductClick(p)}>
                  <div className="w-32 flex-shrink-0" style={{background:'#0d0d14'}}>
                    {p.image ? <img src={p.image} alt={p.name} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-4xl">📦</div>}
                  </div>
                  <div className="flex-1 p-4 flex items-center justify-between">
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="cat-pill">{p.category}</span>
                        {p.badge && <span className={`${getBadgeClass(p.badge)} text-white text-xs font-bold px-2 py-0.5 rounded-full uppercase`}>{p.badge}</span>}
                      </div>
                      <h3 className="font-bold text-white">{p.name}</h3>
                      <p className="text-gray-500 text-sm">{p.tagline}</p>
                    </div>
                    <div className="text-right flex-shrink-0 ml-4">
                      <p className="text-white font-black text-xl mb-1">€{p.price}</p>
                      <div className="flex items-center gap-1 justify-end mb-2">
                        <span className="text-yellow-400 text-sm">★</span>
                        <span className="text-gray-400 text-sm">{p.rating}</span>
                      </div>
                      <button onClick={e => {e.stopPropagation();onAddToCart(p);}}
                        className="btn-primary px-4 py-1.5 rounded-lg text-white text-sm font-semibold">
                        + Carrello
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── CART DRAWER ─── */
function CartDrawer({ cart, removeFromCart, total, onClose, onCheckout }) {
  return (
    <div className="fixed top-0 right-0 h-full w-96 z-50 glass-dark p-6 overflow-y-auto" style={{zIndex:100}}>
      <div className="flex justify-between items-center mb-6">
        <h2 className="text-xl font-bold text-white">Carrello ({cart.length})</h2>
        <button onClick={onClose} className="text-gray-400 hover:text-white text-2xl leading-none">×</button>
      </div>
      {cart.length === 0 ? (
        <div className="text-center py-20 text-gray-500">Il carrello è vuoto</div>
      ) : (
        <>
          <div className="space-y-4 mb-6">
            {cart.map((p,i) => (
              <div key={i} className="glass rounded-xl p-3 flex gap-3 items-center">
                {p.image && <img src={p.image} alt={p.name} className="w-14 h-14 rounded-lg object-cover flex-shrink-0" />}
                <div className="flex-1 min-w-0">
                  <p className="font-semibold text-sm text-white truncate">{p.name}</p>
                  <p className="text-purple-400 font-bold">€{p.price}</p>
                </div>
                <button onClick={() => removeFromCart(i)} className="text-gray-500 hover:text-red-400 transition text-xl">×</button>
              </div>
            ))}
          </div>
          <div className="glass rounded-xl p-4">
            <div className="flex justify-between mb-4">
              <span className="font-bold text-white">Totale</span>
              <span className="text-purple-400 font-bold text-xl">€{total.toFixed(2)}</span>
            </div>
            <button onClick={onCheckout} className="btn-primary w-full py-3 rounded-xl font-semibold text-white">
              Procedi al checkout →
            </button>
          </div>
        </>
      )}
    </div>
  );
}

        )}

        {page === 'products' && (
          <div className="max-w-6xl mx-auto px-6 pt-28">
            <ProductsPage onAddToCart={(p) => {addToCart(p);setCartOpen(true);}} onProductClick={setCurrentProduct} />
            <Footer setPage={setPage} />
          </div>
        )}
      </main>
    </div>

}
