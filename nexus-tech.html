<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0a0f; margin: 0; }

    .aurora-bg { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
    .aurora-bg::before { content:''; position:absolute; width:900px; height:900px; border-radius:50%; background:radial-gradient(circle,rgba(139,92,246,0.18) 0%,transparent 70%); top:-300px; left:-200px; animation:aurora1 10s ease-in-out infinite alternate; }
    .aurora-bg::after { content:''; position:absolute; width:700px; height:700px; border-radius:50%; background:radial-gradient(circle,rgba(236,72,153,0.14) 0%,transparent 70%); top:50px; right:-150px; animation:aurora2 12s ease-in-out infinite alternate; }
    .aurora3 { position:absolute; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(59,130,246,0.1) 0%,transparent 70%); bottom:-100px; left:40%; animation:aurora3 14s ease-in-out infinite alternate; }
    @keyframes aurora1 { from{transform:translate(0,0) scale(1)} to{transform:translate(120px,60px) scale(1.2)} }
    @keyframes aurora2 { from{transform:translate(0,0) scale(1)} to{transform:translate(-80px,100px) scale(1.3)} }
    @keyframes aurora3 { from{transform:translateX(0) scale(1)} to{transform:translateX(80px) scale(1.2)} }

    .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); }
    .glass-dark { background:rgba(0,0,0,0.35); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.06); }
    .glass-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); transition:all 0.3s ease; }
    .glass-card:hover { background:rgba(255,255,255,0.06); border-color:rgba(139,92,246,0.5); transform:translateY(-6px); box-shadow:0 24px 60px rgba(139,92,246,0.2); }

    .gradient-text { background:linear-gradient(135deg,#fff 0%,#a78bfa 50%,#ec4899 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .gradient-text-pink { background:linear-gradient(135deg,#ec4899,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    .btn-primary { background:linear-gradient(135deg,#7c3aed,#9333ea); transition:all 0.3s; }
    .btn-primary:hover { background:linear-gradient(135deg,#6d28d9,#7c3aed); transform:translateY(-2px); box-shadow:0 8px 30px rgba(124,58,237,0.45); }

    .badge-new { background:linear-gradient(135deg,#7c3aed,#9333ea); }
    .badge-featured { background:linear-gradient(135deg,#0ea5e9,#6366f1); }
    .badge-hot { background:linear-gradient(135deg,#f59e0b,#ef4444); }
    .badge-limited { background:linear-gradient(135deg,#10b981,#0ea5e9); }

    .ticker-wrap { overflow:hidden; }
    .ticker { display:inline-flex; gap:4rem; animation:ticker 35s linear infinite; white-space:nowrap; }
    @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    .stat-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); transition:all 0.3s; }
    .stat-card:hover { border-color:rgba(139,92,246,0.4); background:rgba(139,92,246,0.05); }

    .nav-link.active { color:white; }
    .nav-link.active::after { content:''; display:block; height:2px; background:linear-gradient(90deg,#7c3aed,#ec4899); border-radius:2px; margin-top:2px; }

    /* Product 360 rotation */
    .rotate-360 { animation: rotate360 8s linear infinite; }
    @keyframes rotate360 { from{transform:rotateY(0deg)} to{transform:rotateY(360deg)} }

    .product-img-main { transition: all 0.4s ease; }
    .product-thumb { transition: all 0.2s ease; cursor: pointer; }
    .product-thumb:hover { border-color: rgba(139,92,246,0.8) !important; }
    .product-thumb.active { border-color: rgba(139,92,246,1) !important; box-shadow: 0 0 20px rgba(139,92,246,0.4); }

    .tab-btn { transition: all 0.2s; border-bottom: 2px solid transparent; }
    .tab-btn.active { border-bottom-color: #7c3aed; color: white; }

    .wishlist-btn { transition: all 0.2s; }
    .wishlist-btn.active { color: #ec4899 !important; }

    input, textarea, select { color: white !important; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3) !important; }

    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const ADMIN_PASSWORD = 'admin123';

function getProducts() {
  try { return JSON.parse(localStorage.getItem('nexus-products') || '[]'); } catch { return []; }
}
function saveProducts(p) { localStorage.setItem('nexus-products', JSON.stringify(p)); }
function addProduct(p) { const ps = getProducts(); ps.push(p); saveProducts(ps); }
function deleteProduct(id) { saveProducts(getProducts().filter(p => p.id !== id)); }
function updateProduct(u) { saveProducts(getProducts().map(p => p.id === u.id ? u : p)); }

const getBadgeClass = (b) => {
  if (!b) return '';
  const bl = b.toLowerCase();
  if (bl === 'new' || bl === 'nuovo') return 'badge-new';
  if (bl === 'featured' || bl === 'in evidenza') return 'badge-featured';
  if (bl === 'hot') return 'badge-hot';
  if (bl === 'limited' || bl === 'limitato') return 'badge-limited';
  return 'badge-new';
};

function Footer({ setPage }) {
  return (
    <footer style={{borderTop:'1px solid rgba(255,255,255,0.06)',background:'rgba(0,0,0,0.3)'}} className="mt-20">
      <div className="max-w-6xl mx-auto px-6 py-16">
        <div className="rounded-3xl p-10 text-center mb-16" style={{background:'linear-gradient(135deg,rgba(124,58,237,0.2),rgba(236,72,153,0.15))',border:'1px solid rgba(139,92,246,0.3)'}}>
          <h2 className="text-4xl font-bold text-white mb-3">Unisciti a <span className="gradient-text-pink">2.4 milioni</span> di credenti.</h2>
          <p className="text-gray-400 mb-8">Sii il primo a sapere di nuovi prodotti, lanci e storie.</p>
          <div className="flex gap-3 max-w-md mx-auto">
            <input type="email" placeholder="tuo@email.com" className="flex-1 px-4 py-3 rounded-2xl outline-none" style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.12)'}} />
            <button className="btn-primary px-6 py-3 rounded-2xl font-semibold text-white whitespace-nowrap">Iscriviti</button>
          </div>
        </div>
        <div className="grid grid-cols-4 gap-8 mb-12">
          <div>
            <div className="flex items-center gap-2 mb-4">
              <div className="w-7 h-7 rounded-lg btn-primary flex items-center justify-center text-xs font-bold text-white">N</div>
              <span className="font-bold text-white">NEXUS<span className="gradient-text">TECH</span></span>
            </div>
            <p className="text-gray-500 text-sm">Tecnologia premium per il domani.</p>
            <p className="text-gray-600 text-sm mt-2">ITALIA</p>
          </div>
          <div>
            <h4 className="text-white font-semibold mb-4">Negozio</h4>
            <ul className="space-y-2 text-gray-500 text-sm">
              {['Audio','Wearables','Computing','Vision'].map(i => (
                <li key={i}><button onClick={() => setPage('products')} className="hover:text-gray-300 transition">{i}</button></li>
              ))}
            </ul>
          </div>
          <div>
            <h4 className="text-white font-semibold mb-4">Azienda</h4>
            <ul className="space-y-2 text-gray-500 text-sm">
              {['Chi siamo','Lavora con noi','Stampa','Sostenibilità'].map(i => (
                <li key={i}><button className="hover:text-gray-300 transition">{i}</button></li>
              ))}
            </ul>
          </div>
          <div>
            <h4 className="text-white font-semibold mb-4">Supporto</h4>
            <ul className="space-y-2 text-gray-500 text-sm">
              {['Centro assistenza','Contatti','Garanzia','Resi'].map(i => (
                <li key={i}><button className="hover:text-gray-300 transition">{i}</button></li>
              ))}
            </ul>
          </div>
        </div>
        <div className="flex justify-between items-center pt-6" style={{borderTop:'1px solid rgba(255,255,255,0.06)'}}>
          <p className="text-gray-600 text-sm">© 2026 Nexus Tech AG. Tutti i diritti riservati.</p>
          <p className="text-gray-700 text-sm">v4.2.0 · build a91f</p>
        </div>
      </div>
    </footer>
  );
}

function ProductDetailPage({ product, onAddToCart, onBack, allProducts, setCurrentProduct }) {
  const [activeImg, setActiveImg] = useState(0);
  const [activeTab, setActiveTab] = useState('overview');
  const [wishlisted, setWishlisted] = useState(false);
  const [is360, setIs360] = useState(false);
  const [added, setAdded] = useState(false);
  const [qty, setQty] = useState(1);

  const images = product.image ? [product.image] : [];
  const related = allProducts.filter(p => p.id !== product.id && p.category === product.category).slice(0, 3);

  const handleAddToCart = () => {
    for (let i = 0; i < qty; i++) onAddToCart(product);
    setAdded(true);
    setTimeout(() => setAdded(false), 2000);
  };

  const originalPrice = product.originalPrice || Math.round(product.price * 1.2);
  const discount = Math.round((1 - product.price / originalPrice) * 100);

  return (
    <div className="fade-in">
      <div className="max-w-6xl mx-auto px-6 pt-28 pb-10">
        <button onClick={onBack} className="text-gray-400 hover:text-white transition flex items-center gap-2 mb-8">
          ← Torna al catalogo
        </button>

        <div className="grid grid-cols-2 gap-16 mb-20">
          {/* Left - Images */}
          <div>
            <div className="relative rounded-3xl overflow-hidden mb-4" style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',aspectRatio:'1'}}>
              {images.length > 0 ? (
                <img
                  src={images[activeImg]}
                  alt={product.name}
                  className={`w-full h-full object-contain p-8 product-img-main ${is360 ? 'rotate-360' : ''}`}
                  style={{transition:'all 0.4s'}}
                />
              ) : (
                <div className="w-full h-full flex items-center justify-center text-8xl">📦</div>
              )}
              {/* 360 button */}
              <button
                onClick={() => setIs360(!is360)}
                className={`absolute top-4 right-4 glass px-3 py-1.5 rounded-full text-xs font-bold transition ${is360 ? 'text-purple-400 border-purple-500' : 'text-gray-400'}`}
                style={{border: is360 ? '1px solid rgba(139,92,246,0.6)' : undefined}}>
                360°
              </button>
              {/* Aurora glow */}
              <div className="absolute inset-0 pointer-events-none" style={{background:'radial-gradient(circle at 50% 50%,rgba(139,92,246,0.08) 0%,transparent 70%)'}}></div>
            </div>

            {/* Thumbnails */}
            {images.length > 1 && (
              <div className="flex gap-3">
                {images.map((img, i) => (
                  <button key={i} onClick={() => setActiveImg(i)}
                    className={`product-thumb rounded-xl overflow-hidden flex-1`}
                    style={{border: `2px solid ${i === activeImg ? 'rgba(139,92,246,1)' : 'rgba(255,255,255,0.08)'}`, aspectRatio:'1', background:'rgba(255,255,255,0.03)'}}>
                    <img src={img} alt="" className="w-full h-full object-contain p-2" />
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Right - Info */}
          <div className="flex flex-col">
            <div className="flex items-center gap-3 mb-4">
              <span className="glass text-gray-300 text-sm px-3 py-1 rounded-full">{product.category}</span>
              {product.badge && (
                <span className={`${getBadgeClass(product.badge)} text-white text-xs font-bold px-3 py-1 rounded-full uppercase`}>{product.badge}</span>
              )}
            </div>

            <h1 className="text-4xl font-black text-white mb-2">{product.name}</h1>
            <p className="text-gray-400 text-lg mb-4">{product.tagline}</p>

            {/* Rating */}
            <div className="flex items-center gap-3 mb-6">
              <div className="flex gap-1">
                {[1,2,3,4,5].map(i => (
                  <span key={i} className={`text-lg ${i <= Math.round(product.rating) ? 'text-yellow-400' : 'text-gray-700'}`}>★</span>
                ))}
              </div>
              <span className="text-white font-semibold">{product.rating}</span>
              {product.reviews > 0 && <span className="text-gray-500 text-sm">{product.reviews.toLocaleString()} recensioni</span>}
            </div>

            {/* Price */}
            <div className="flex items-center gap-4 mb-8">
              <span className="text-5xl font-black text-white">€{product.price}</span>
              <div className="flex flex-col">
                <span className="text-gray-500 line-through text-lg">€{originalPrice}</span>
                <span className="text-green-400 text-sm font-bold">-{discount}%</span>
              </div>
              <span className="text-gray-600 text-sm">IVA inclusa</span>
            </div>

            {/* Qty + Add to cart */}
            <div className="flex gap-3 mb-4">
              <div className="glass rounded-xl flex items-center">
                <button onClick={() => setQty(Math.max(1,qty-1))} className="px-4 py-3 text-gray-400 hover:text-white transition text-lg">−</button>
                <span className="px-4 text-white font-semibold">{qty}</span>
                <button onClick={() => setQty(qty+1)} className="px-4 py-3 text-gray-400 hover:text-white transition text-lg">+</button>
              </div>
              <button onClick={handleAddToCart}
                className={`flex-1 py-3 rounded-xl font-bold text-white text-lg transition ${added ? 'bg-green-600' : 'btn-primary'}`}>
                {added ? '✓ Aggiunto!' : 'Aggiungi al carrello'}
              </button>
            </div>

            {/* Wishlist */}
            <button
              onClick={() => setWishlisted(!wishlisted)}
              className={`w-full py-3 rounded-xl font-semibold transition glass hover:bg-white/10 ${wishlisted ? 'text-pink-400' : 'text-gray-400'}`}>
              {wishlisted ? '♥ Nella wishlist' : '♡ Aggiungi alla wishlist'}
            </button>

            {/* AI explained */}
            <div className="mt-6 rounded-2xl p-4" style={{background:'rgba(139,92,246,0.08)',border:'1px solid rgba(139,92,246,0.2)'}}>
              <div className="flex items-center gap-2 mb-2">
                <span className="text-purple-400 text-sm">✦</span>
                <span className="text-purple-300 text-sm font-semibold">Nexus AI · spiegato</span>
              </div>
              <p className="text-gray-400 text-sm leading-relaxed">{product.description || 'Un prodotto straordinario progettato per chi non scende a compromessi. Ingegnerizzato con materiali aerospace-grade e testato da professionisti.'}</p>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div className="mb-8" style={{borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
          <div className="flex gap-8">
            {['overview','specs','reviews'].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)}
                className={`tab-btn pb-4 font-semibold capitalize transition ${activeTab===tab ? 'active text-white' : 'text-gray-500 hover:text-gray-300'}`}>
                {tab === 'overview' ? 'Panoramica' : tab === 'specs' ? 'Specifiche' : 'Recensioni'}
              </button>
            ))}
          </div>
        </div>

        {activeTab === 'overview' && (
          <div className="fade-in text-gray-400 leading-relaxed max-w-2xl">
            <p className="text-lg mb-4">{product.description || 'Un capolavoro ingegneristico realizzato con materiali aerospace-grade. Ogni dettaglio è stato curato dal nostro team di 200 designer a Zurigo.'}</p>
            <p>Progettato per durare un decennio, con software aggiornabile e componenti riparabili. La sostenibilità incontra le prestazioni premium.</p>
          </div>
        )}

        {activeTab === 'specs' && (
          <div className="fade-in">
            {product.specs && product.specs.length > 0 ? (
              <div className="grid grid-cols-2 gap-3 max-w-2xl">
                {product.specs.map((s, i) => (
                  <div key={i} className="glass rounded-xl p-4 flex justify-between items-center">
                    <span className="text-gray-400 text-sm">{s.label}</span>
                    <span className="text-white font-semibold text-sm">{s.value}</span>
                  </div>
                ))}
              </div>
            ) : (
              <p className="text-gray-500">Nessuna specifica disponibile.</p>
            )}
          </div>
        )}

        {activeTab === 'reviews' && (
          <div className="fade-in max-w-2xl">
            <div className="flex items-center gap-6 mb-8">
              <div className="text-center">
                <div className="text-6xl font-black text-white">{product.rating}</div>
                <div className="flex gap-1 justify-center mt-1">
                  {[1,2,3,4,5].map(i => <span key={i} className={i <= Math.round(product.rating) ? 'text-yellow-400' : 'text-gray-700'}>★</span>)}
                </div>
                <div className="text-gray-500 text-sm mt-1">{(product.reviews||0).toLocaleString()} recensioni</div>
              </div>
            </div>
            {/* Sample reviews */}
            {[
              { name:'Marco R.', stars:5, text:'Prodotto eccezionale, supera ogni aspettativa. La qualità costruttiva è impressionante.' },
              { name:'Sofia L.', stars:5, text:'Finalmente un prodotto che mantiene le promesse. Design sublime e prestazioni top.' },
              { name:'Luca M.', stars:4, text:'Ottimo acquisto, solo un piccolo miglioramento sulla custodia e sarebbe perfetto.' },
            ].map((r,i) => (
              <div key={i} className="glass rounded-xl p-4 mb-3">
                <div className="flex justify-between mb-2">
                  <span className="font-semibold text-white">{r.name}</span>
                  <div className="flex gap-0.5">
                    {[1,2,3,4,5].map(s => <span key={s} className={s<=r.stars?'text-yellow-400 text-sm':'text-gray-700 text-sm'}>★</span>)}
                  </div>
                </div>
                <p className="text-gray-400 text-sm">{r.text}</p>
              </div>
            ))}
          </div>
        )}

        {/* Related products */}
        {related.length > 0 && (
          <div className="mt-16">
            <h2 className="text-2xl font-bold text-white mb-6">Potresti amare anche</h2>
            <div className="grid grid-cols-3 gap-6">
              {related.map(p => (
                <div key={p.id} className="glass-card rounded-2xl overflow-hidden cursor-pointer" onClick={() => setCurrentProduct(p)}>
                  {p.image
                    ? <img src={p.image} alt={p.name} className="w-full h-40 object-cover" />
                    : <div className="w-full h-40 flex items-center justify-center text-4xl" style={{background:'rgba(255,255,255,0.02)'}}>📦</div>}
                  <div className="p-4">
                    <p className="text-gray-400 text-xs mb-1">{p.category}</p>
                    <h3 className="font-bold text-white">{p.name}</h3>
                    <p className="text-white font-bold mt-1">€{p.price}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminPage({ onBack }) {
  const [authed, setAuthed] = useState(false);
  const [password, setPassword] = useState('');
  const [products, setProducts] = useState([]);
  const empty = { name:'', tagline:'', category:'Audio', price:0, originalPrice:0, rating:5, reviews:0, image:'', badge:'', specs:[], description:'' };
  const [form, setForm] = useState(empty);
  const [editId, setEditId] = useState(null);
  const [specInput, setSpecInput] = useState({ label:'', value:'' });

  useEffect(() => { if (authed) setProducts(getProducts()); }, [authed]);

  if (!authed) return (
    <div className="min-h-screen flex items-center justify-center" style={{background:'#0a0a0f'}}>
      <div className="aurora-bg"><div className="aurora3"></div></div>
      <div className="glass rounded-3xl p-10 w-96 relative z-10">
        <div className="text-center mb-8">
          <div className="w-14 h-14 rounded-2xl btn-primary flex items-center justify-center text-2xl font-bold text-white mx-auto mb-4">N</div>
          <h2 className="text-white text-3xl font-bold">Admin</h2>
          <p className="text-gray-400 mt-2">Pannello di controllo</p>
        </div>
        <input type="password" placeholder="Password" value={password}
          onChange={e => setPassword(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && password === ADMIN_PASSWORD && setAuthed(true)}
          className="w-full px-4 py-3 rounded-xl mb-4 outline-none"
          style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}} />
        <button onClick={() => password === ADMIN_PASSWORD ? setAuthed(true) : alert('Password errata!')}
          className="btn-primary w-full text-white py-3 rounded-xl font-semibold">Accedi</button>
      </div>
    </div>
  );

  const handleSubmit = () => {
    if (!form.name || !form.price) return alert('Nome e prezzo obbligatori!');
    if (editId) updateProduct({ ...form, id: editId });
    else addProduct({ ...form, id: crypto.randomUUID() });
    setProducts(getProducts()); setForm(empty); setEditId(null);
  };

  return (
    <div className="min-h-screen text-white p-6" style={{background:'#0a0a0f'}}>
      <div className="aurora-bg"><div className="aurora3"></div></div>
      <div className="max-w-4xl mx-auto relative z-10">
        <div className="flex items-center gap-4 mb-8">
          <button onClick={onBack} className="glass px-4 py-2 rounded-xl text-gray-400 hover:text-white transition">← Torna al sito</button>
          <h1 className="text-3xl font-bold">Admin <span className="gradient-text">Panel</span></h1>
        </div>
        <div className="glass rounded-2xl p-6 mb-8">
          <h2 className="text-xl font-semibold mb-4">{editId ? 'Modifica' : 'Aggiungi'} Prodotto</h2>
          <div className="grid grid-cols-2 gap-4">
            {[['Nome','name','text'],['Tagline','tagline','text'],['Prezzo (€)','price','number'],['Prezzo originale (€)','originalPrice','number'],['Badge (New/Featured/Hot/Limited)','badge','text'],['URL Immagine','image','text'],['Rating (1-5)','rating','number'],['Numero recensioni','reviews','number']].map(([ph,key,type]) => (
              <input key={key} placeholder={ph} type={type} value={form[key]}
                onChange={e => setForm({...form,[key]:type==='number'?+e.target.value:e.target.value})}
                className="px-4 py-2 rounded-xl outline-none"
                style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}} />
            ))}
            <select value={form.category} onChange={e => setForm({...form,category:e.target.value})}
              className="px-4 py-2 rounded-xl outline-none"
              style={{background:'rgba(15,15,25,0.95)',border:'1px solid rgba(255,255,255,0.1)'}}>
              {['Audio','Wearables','Computing','Vision','Home','Gaming'].map(c => <option key={c}>{c}</option>)}
            </select>
            <textarea placeholder="Descrizione" value={form.description}
              onChange={e => setForm({...form,description:e.target.value})}
              className="px-4 py-2 rounded-xl outline-none col-span-2" rows={3}
              style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}} />
          </div>
          <div className="mt-4">
            <p className="text-sm text-gray-400 mb-2">Specifiche tecniche</p>
            <div className="flex gap-2 mb-2">
              <input placeholder="Label" value={specInput.label} onChange={e => setSpecInput({...specInput,label:e.target.value})}
                className="px-4 py-2 rounded-xl outline-none flex-1"
                style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}} />
              <input placeholder="Valore" value={specInput.value} onChange={e => setSpecInput({...specInput,value:e.target.value})}
                className="px-4 py-2 rounded-xl outline-none flex-1"
                style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}} />
              <button onClick={() => {if(specInput.label&&specInput.value){setForm({...form,specs:[...form.specs,specInput]});setSpecInput({label:'',value:''});}}}
                className="btn-primary px-4 py-2 rounded-xl text-white">+</button>
            </div>
            <div className="flex flex-wrap gap-2">
              {form.specs.map((s,i) => (
                <span key={i} className="glass text-sm px-3 py-1 rounded-full">
                  {s.label}: {s.value}
                  <button onClick={() => setForm({...form,specs:form.specs.filter((_,j)=>j!==i)})} className="ml-2 text-red-400">×</button>
                </span>
              ))}
            </div>
          </div>
          <div className="flex gap-3 mt-6">
            <button onClick={handleSubmit} className="btn-primary px-8 py-3 rounded-xl font-semibold text-white">
              {editId ? 'Salva Modifiche' : 'Aggiungi Prodotto'}
            </button>
            {editId && <button onClick={() => {setEditId(null);setForm(empty);}} className="glass px-8 py-3 rounded-xl font-semibold hover:bg-white/10 transition">Annulla</button>}
          </div>
        </div>
        <div>
          <h2 className="text-xl font-semibold mb-4">Prodotti ({products.length})</h2>
          {products.length === 0 ? <p className="text-gray-500">Nessun prodotto ancora.</p> : (
            <div className="space-y-3">
              {products.map(p => (
                <div key={p.id} className="glass rounded-xl p-4 flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    {p.image && <img src={p.image} alt={p.name} className="w-14 h-14 rounded-lg object-cover" />}
                    <div>
                      <p className="font-semibold">{p.name} <span className="text-purple-400">€{p.price}</span></p>
                      <p className="text-sm text-gray-400">{p.category} · {p.tagline}</p>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => {setEditId(p.id);setForm({...p});}} className="glass px-4 py-2 rounded-lg text-sm hover:bg-white/10 transition">Modifica</button>
                    <button onClick={() => {if(confirm('Eliminare?')){deleteProduct(p.id);setProducts(getProducts());}}} className="px-4 py-2 rounded-lg text-sm bg-red-500/20 hover:bg-red-500/30 transition text-red-400">Elimina</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ProductsPage({ onAddToCart, onProductClick }) {
  const [products, setProducts] = useState([]);
  const [category, setCategory] = useState('All');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('default');

  useEffect(() => { setProducts(getProducts()); }, []);

  const categories = ['All', ...Array.from(new Set(products.map(p => p.category)))];
  let filtered = category === 'All' ? products : products.filter(p => p.category === category);
  if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.tagline.toLowerCase().includes(search.toLowerCase()));
  if (sort === 'price-asc') filtered = [...filtered].sort((a,b) => a.price - b.price);
  if (sort === 'price-desc') filtered = [...filtered].sort((a,b) => b.price - a.price);
  if (sort === 'rating') filtered = [...filtered].sort((a,b) => b.rating - a.rating);

  if (products.length === 0) return (
    <div className="text-center py-32">
      <div className="text-6xl mb-6">📦</div>
      <h2 className="text-3xl font-bold text-white mb-3">Nessun prodotto</h2>
      <p className="text-gray-400">Aggiungili dal pannello Admin!</p>
    </div>
  );

  return (
    <div className="py-10">
      <p className="text-purple-400 text-sm font-semibold tracking-widest uppercase mb-2">COLLEZIONE 04</p>
      <h2 className="text-5xl font-bold text-white mb-2">Negozio</h2>
      <p className="text-gray-400 mb-8">Tecnologia premium per il prossimo decennio.</p>

      {/* Search + Sort */}
      <div className="flex gap-4 mb-6">
        <input placeholder="🔍 Cerca prodotti..." value={search} onChange={e => setSearch(e.target.value)}
          className="flex-1 px-4 py-2 rounded-xl outline-none"
          style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}} />
        <select value={sort} onChange={e => setSort(e.target.value)}
          className="px-4 py-2 rounded-xl outline-none"
          style={{background:'rgba(15,15,25,0.95)',border:'1px solid rgba(255,255,255,0.1)'}}>
          <option value="default">Ordinamento</option>
          <option value="price-asc">Prezzo ↑</option>
          <option value="price-desc">Prezzo ↓</option>
          <option value="rating">Valutazione</option>
        </select>
      </div>

      <div className="flex gap-3 mb-8 flex-wrap">
        {categories.map(c => (
          <button key={c} onClick={() => setCategory(c)}
            className={`px-5 py-2 rounded-full text-sm font-medium transition ${category===c?'btn-primary text-white':'glass text-gray-400 hover:text-white'}`}>
            {c}
          </button>
        ))}
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {filtered.map(p => (
          <div key={p.id} className="glass-card rounded-2xl overflow-hidden cursor-pointer" onClick={() => onProductClick(p)}>
            <div className="relative">
              {p.image
                ? <img src={p.image} alt={p.name} className="w-full h-56 object-cover" />
                : <div className="w-full h-56 flex items-center justify-center text-5xl" style={{background:'rgba(255,255,255,0.02)'}}>📦</div>}
              <div className="absolute top-3 left-3 right-3 flex justify-between items-start">
                {p.badge && <span className={`${getBadgeClass(p.badge)} text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide`}>{p.badge}</span>}
                <span className="glass text-gray-300 text-xs px-3 py-1 rounded-full ml-auto">{p.category}</span>
              </div>
            </div>
            <div className="p-5">
              <h3 className="text-white font-bold text-lg mb-1">{p.name}</h3>
              <p className="text-gray-400 text-sm mb-4">{p.tagline}</p>
              <div className="flex items-center justify-between mb-4">
                <span className="text-white font-bold text-2xl">€{p.price}</span>
                <div className="flex items-center gap-1">
                  <span className="text-yellow-400 text-sm">★</span>
                  <span className="text-gray-300 text-sm">{p.rating}</span>
                  {p.reviews > 0 && <span className="text-gray-500 text-xs">({p.reviews})</span>}
                </div>
              </div>
              {p.specs && p.specs.length > 0 && (
                <div className="flex flex-wrap gap-2 mb-4">
                  {p.specs.slice(0,3).map((s,i) => (
                    <span key={i} className="glass text-gray-300 text-xs px-2 py-1 rounded-lg">{s.label}: {s.value}</span>
                  ))}
                </div>
              )}
              <button onClick={e => {e.stopPropagation();onAddToCart(p);}}
                className="btn-primary w-full text-white py-2.5 rounded-xl font-semibold">
                Aggiungi al carrello
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState('home');
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [currentProduct, setCurrentProduct] = useState(null);
  const [aiQuery, setAiQuery] = useState('');

  const addToCart = (p) => setCart(prev => [...prev, p]);
  const removeFromCart = (i) => setCart(prev => prev.filter((_,j) => j !== i));
  const total = cart.reduce((sum,p) => sum + p.price, 0);

  const tickerItems = ['TIME · Best Invention 2026','WIRED · 10/10','Fast Company · Most Innovative','Wallpaper* · Design of the Year','T3 · Gadget of the Year','Engadget · Editor\'s Choice'];
  const stats = [{value:'2.4M+',label:'Utenti attivi'},{value:'84',label:'Paesi'},{value:'37',label:'Premi di design'},{value:'99.99%',label:'Uptime'}];

  if (page === 'admin') return <AdminPage onBack={() => setPage('home')} />;

  if (currentProduct) return (
    <div className="min-h-screen text-white" style={{background:'#0a0a0f'}}>
      <div className="aurora-bg"><div className="aurora3"></div></div>
      <nav className="fixed top-0 w-full z-50 px-6 py-4">
        <div className="max-w-6xl mx-auto glass rounded-2xl px-6 py-3 flex justify-between items-center">
          <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setCurrentProduct(null);setPage('home');}}>
            <div className="w-8 h-8 rounded-lg btn-primary flex items-center justify-center text-sm font-bold text-white">N</div>
            <span className="font-bold text-lg">NEXUS<span className="gradient-text">TECH</span></span>
          </div>
          <div className="flex gap-6 text-sm">
            <button onClick={() => {setCurrentProduct(null);setPage('home');}} className="text-gray-400 hover:text-white transition font-medium">Home</button>
            <button onClick={() => {setCurrentProduct(null);setPage('products');}} className="text-gray-400 hover:text-white transition font-medium">Negozio</button>
            <button onClick={() => {setCurrentProduct(null);setPage('admin');}} className="text-gray-400 hover:text-white transition font-medium">Admin</button>
          </div>
          <button onClick={() => setCartOpen(!cartOpen)} className="glass px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2 hover:bg-white/10 transition">
            🛒 {cart.length > 0 && <span className="btn-primary text-white text-xs px-2 py-0.5 rounded-full">{cart.length}</span>}
          </button>
        </div>
      </nav>
      {cartOpen && <CartDrawer cart={cart} removeFromCart={removeFromCart} total={total} onClose={() => setCartOpen(false)} />}
      <div className="relative z-10">
        <ProductDetailPage
          product={currentProduct}
          onAddToCart={(p) => {addToCart(p);setCartOpen(true);}}
          onBack={() => {setCurrentProduct(null);setPage('products');}}
          allProducts={getProducts()}
          setCurrentProduct={setCurrentProduct}
        />
        <Footer setPage={(p) => {setCurrentProduct(null);setPage(p);}} />
      </div>
    </div>
  );

  return (
    <div className="min-h-screen text-white relative" style={{background:'#0a0a0f'}}>
      <div className="aurora-bg"><div className="aurora3"></div></div>

      <nav className="fixed top-0 w-full z-50 px-6 py-4">
        <div className="max-w-6xl mx-auto glass rounded-2xl px-6 py-3 flex justify-between items-center">
          <div className="flex items-center gap-3 cursor-pointer" onClick={() => setPage('home')}>
            <div className="w-8 h-8 rounded-lg btn-primary flex items-center justify-center text-sm font-bold text-white">N</div>
            <span className="font-bold text-lg">NEXUS<span className="gradient-text">TECH</span></span>
          </div>
          <div className="flex gap-6 text-sm">
            {[['home','Home'],['products','Negozio'],['admin','Admin']].map(([p,label]) => (
              <button key={p} onClick={() => setPage(p)}
                className={`nav-link font-medium transition ${page===p?'active text-white':'text-gray-400 hover:text-white'}`}>
                {label}
              </button>
            ))}
          </div>
          <button onClick={() => setCartOpen(!cartOpen)} className="glass px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2 hover:bg-white/10 transition">
            🛒 {cart.length > 0 && <span className="btn-primary text-white text-xs px-2 py-0.5 rounded-full">{cart.length}</span>}
          </button>
        </div>
      </nav>

      {cartOpen && <CartDrawer cart={cart} removeFromCart={removeFromCart} total={total} onClose={() => setCartOpen(false)} />}

      <main className="relative z-10">
        {page === 'home' && (
          <>
            <div className="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-24 pb-10">
              <div className="glass rounded-full px-5 py-2 text-sm text-purple-300 mb-8 inline-flex items-center gap-2">✦ Nuovo silicio Nexus N1 →</div>
              <h1 className="text-7xl font-black mb-4 leading-tight max-w-4xl">
                Il futuro,<br/><span className="gradient-text">consegnato oggi.</span>
              </h1>
              <p className="text-gray-400 text-xl mb-10 max-w-lg">Tecnologia premium ingegnerizzata per il prossimo decennio. Progettata a Zurigo, costruita per tutti.</p>
              <div className="flex gap-4 mb-12">
                <button onClick={() => setPage('products')} className="btn-primary px-8 py-4 rounded-2xl font-semibold text-white text-lg">Scopri la collezione →</button>
                <button className="glass px-8 py-4 rounded-2xl font-semibold text-white text-lg hover:bg-white/10 transition">Guarda il keynote</button>
              </div>
              <div className="w-full max-w-xl">
                <div className="glass rounded-2xl p-1 flex items-center gap-3">
                  <div className="w-9 h-9 rounded-xl btn-primary flex items-center justify-center flex-shrink-0 ml-2"><span className="text-sm text-white">✦</span></div>
                  <input placeholder="Chiedi a Nexus AI — prova 'migliori cuffie sotto €500'" value={aiQuery} onChange={e => setAiQuery(e.target.value)}
                    className="flex-1 bg-transparent outline-none text-sm py-2" style={{color:'rgba(255,255,255,0.7)'}} />
                  <button className="btn-primary px-4 py-2 rounded-xl text-white text-sm font-semibold mr-1" onClick={() => {if(aiQuery.trim())setPage('products');}}>Chiedi</button>
                </div>
                <div className="flex gap-2 mt-3 flex-wrap justify-center">
                  {['Audio spaziale','Occhiali AR','Regalo sotto €300','9 giorni di batteria'].map(tag => (
                    <button key={tag} onClick={() => setPage('products')} className="glass text-gray-400 text-xs px-3 py-1 rounded-full hover:text-white transition">{tag}</button>
                  ))}
                </div>
              </div>
            </div>

            <div className="ticker-wrap py-4" style={{borderTop:'1px solid rgba(255,255,255,0.05)',borderBottom:'1px solid rgba(255,255,255,0.05)',background:'rgba(255,255,255,0.02)'}}>
              <div className="ticker">
                {[...tickerItems,...tickerItems].map((item,i) => (
                  <span key={i} className="text-gray-500 text-sm font-medium">★ {item}</span>
                ))}
              </div>
            </div>

            <div className="max-w-6xl mx-auto px-6 py-16">
              <div className="grid grid-cols-4 gap-4">
                {stats.map((s,i) => (
                  <div key={i} className="stat-card rounded-2xl p-6 text-center">
                    <div className="text-4xl font-black gradient-text-pink mb-2">{s.value}</div>
                    <div className="text-gray-400 text-sm">{s.label}</div>
                  </div>
                ))}
              </div>
            </div>

            {getProducts().length > 0 && (
              <div className="max-w-6xl mx-auto px-6 pb-10">
                <div className="flex justify-between items-end mb-8">
                  <div>
                    <p className="text-purple-400 text-sm font-semibold tracking-widest uppercase mb-1">COLLEZIONE 04</p>
                    <h2 className="text-4xl font-bold text-white">Prodotti in evidenza</h2>
                  </div>
                  <button onClick={() => setPage('products')} className="text-gray-400 hover:text-white transition text-sm">Vedi tutti →</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {getProducts().slice(0,3).map(p => (
                    <div key={p.id} className="glass-card rounded-2xl overflow-hidden cursor-pointer" onClick={() => setCurrentProduct(p)}>
                      <div className="relative">
                        {p.image ? <img src={p.image} alt={p.name} className="w-full h-52 object-cover" /> : <div className="w-full h-52 flex items-center justify-center text-4xl" style={{background:'rgba(255,255,255,0.02)'}}>📦</div>}
                        <div className="absolute top-3 left-3 right-3 flex justify-between">
                          {p.badge && <span className={`${getBadgeClass(p.badge)} text-white text-xs font-bold px-3 py-1 rounded-full uppercase`}>{p.badge}</span>}
                          <span className="glass text-gray-300 text-xs px-3 py-1 rounded-full ml-auto">{p.category}</span>
                        </div>
                      </div>
                      <div className="p-4">
                        <h3 className="font-bold text-white text-lg">{p.name}</h3>
                        <p className="text-gray-400 text-sm mb-2">{p.tagline}</p>
                        <div className="flex justify-between items-center">
                          <p className="text-white font-bold text-xl">€{p.price}</p>
                          <div className="flex items-center gap-1"><span className="text-yellow-400 text-sm">★</span><span className="text-gray-300 text-sm">{p.rating}</span></div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <Footer setPage={setPage} />
          </>
        )}

        {page === 'products' && (
          <div className="max-w-6xl mx-auto px-6 pt-28">
            <ProductsPage onAddToCart={(p) => {addToCart(p);setCartOpen(true);}} onProductClick={setCurrentProduct} />
            <Footer setPage={setPage} />
          </div>
        )}
      </main>
    </div>
  );
}

function CartDrawer({ cart, removeFromCart, total, onClose }) {
  return (
    <div className="fixed top-0 right-0 h-full w-96 z-50 glass-dark p-6 overflow-y-auto" style={{zIndex:100}}>
      <div className="flex justify-between items-center mb-6">
        <h2 className="text-xl font-bold text-white">Carrello ({cart.length})</h2>
        <button onClick={onClose} className="text-gray-400 hover:text-white text-2xl leading-none">×</button>
      </div>
      {cart.length === 0 ? (
        <div className="text-center py-20 text-gray-500">Il carrello è vuoto</div>
      ) : (
        <>
          <div className="space-y-4 mb-6">
            {cart.map((p,i) => (
              <div key={i} className="glass rounded-xl p-3 flex gap-3 items-center">
                {p.image && <img src={p.image} alt={p.name} className="w-14 h-14 rounded-lg object-cover" />}
                <div className="flex-1 min-w-0">
                  <p className="font-semibold text-sm text-white truncate">{p.name}</p>
                  <p className="text-purple-400 font-bold">€{p.price}</p>
                </div>
                <button onClick={() => removeFromCart(i)} className="text-gray-500 hover:text-red-400 transition text-xl">×</button>
              </div>
            ))}
          </div>
          <div className="glass rounded-xl p-4">
            <div className="flex justify-between mb-4">
              <span className="font-bold text-white">Totale</span>
              <span className="text-purple-400 font-bold text-xl">€{total}</span>
            </div>
            <button className="btn-primary w-full py-3 rounded-xl font-semibold text-white">Checkout</button>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
